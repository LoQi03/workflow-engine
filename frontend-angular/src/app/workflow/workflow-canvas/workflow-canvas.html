<div class="relative w-full h-full">
  <vflow
    #vflow
    view="auto"
    [nodes]="nodes()"
    [edges]="edges()"
    [background]="{ type: 'dots', gap: 20, size: 1, color: 'hsl(var(--canvas-grid))' }"
    [snapGrid]="[16, 16]"
    (connect)="onConnect($event)"
  >
    <mini-map maskColor="hsl(var(--background) / 0.8)" />
  </vflow>

  <div class="absolute bottom-4 right-4 flex flex-col gap-1 rounded-lg border border-border bg-card p-1 shadow-md">
    <button
      type="button"
      class="flex items-center justify-center w-8 h-8 rounded-md text-foreground hover:bg-accent"
      aria-label="Zoom in"
      (click)="zoomIn()"
    >
      <ng-icon name="lucideZoomIn" class="w-4 h-4" />
    </button>
    <button
      type="button"
      class="flex items-center justify-center w-8 h-8 rounded-md text-foreground hover:bg-accent"
      aria-label="Zoom out"
      (click)="zoomOut()"
    >
      <ng-icon name="lucideZoomOut" class="w-4 h-4" />
    </button>
    <button
      type="button"
      class="flex items-center justify-center w-8 h-8 rounded-md text-foreground hover:bg-accent"
      aria-label="Fit view"
      (click)="fitView()"
    >
      <ng-icon name="lucideMaximize" class="w-4 h-4" />
    </button>
  </div>
</div>
