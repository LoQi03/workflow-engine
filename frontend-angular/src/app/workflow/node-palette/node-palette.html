<div class="w-64 bg-sidebar border-r border-border flex flex-col h-full">
  <div class="p-4 border-b border-border">
    <h2 class="text-sm font-bold text-foreground tracking-wide uppercase">Nodes</h2>
    <p class="text-xs text-muted-foreground mt-1">Drag to canvas</p>
  </div>

  <div class="flex-1 overflow-y-auto p-3 space-y-5">
    @for (group of groups; track group.category) {
      <div>
        <h3
          class="text-[10px] font-semibold uppercase tracking-widest mb-2 px-1"
          [style.color]="'hsl(' + group.color + ')'"
        >
          {{ group.label }}
        </h3>
        <div class="space-y-1.5">
          @for (t of group.templates; track t.type) {
            <div
              draggable="true"
              (dragstart)="onDragStart($event, t)"
              class="flex items-center gap-2.5 px-2.5 py-2 rounded-md bg-card border border-border
                cursor-grab active:cursor-grabbing hover:border-primary/40
                transition-all duration-150 group"
            >
              <ng-icon name="lucideGripVertical" class="w-3.5 h-3.5 text-muted-foreground/40 group-hover:text-muted-foreground transition-colors" />
              <div
                class="flex items-center justify-center w-6 h-6 rounded"
                [style.background-color]="'hsl(' + colorMap[t.category] + ' / 0.12)'"
              >
                <ng-icon [name]="iconFor(t)" class="w-3.5 h-3.5" [style.color]="'hsl(' + colorMap[t.category] + ')'" />
              </div>
              <div class="min-w-0">
                <p class="text-xs font-medium text-foreground truncate">{{ t.label }}</p>
                <p class="text-[10px] text-muted-foreground truncate">{{ t.description }}</p>
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
